<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bear.saving | 蓄水池系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #FFF9E3;
            color: #5F4B32;
        }

        .cream-card {
            background-color: #FFFFFF;
            border-radius: 2.5rem;
            box-shadow: 0 20px 50px rgba(217, 176, 120, 0.1);
        }

        .water-wave {
            transition: height 1s cubic-bezier(0.4, 0, 0.2, 1);
            background: linear-gradient(180deg, #FFD966 0%, #F4B400 100%);
            position: relative;
        }

        input:focus,
        select:focus {
            background-color: #FFFFFF;
            border: 2px solid #F4B400;
            outline: none;
        }

        .input-label {
            font-size: 10px;
            font-weight: 900;
            color: #A67C52;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 4px;
            display: block;
        }

        .protocol-box {
            background-color: #FDFBF0;
            border-radius: 1rem;
            padding: 1rem;
            border: 1px solid #F3E5AB;
        }

        .result-highlight {
            background-color: #FFFDF5;
            border: 1px dashed #F4B400;
            border-radius: 12px;
            padding: 12px;
        }

        .mode-btn {
            transition: all 0.2s ease;
        }

        .mode-active {
            background-color: #F4B400;
            color: white;
        }
    </style>
</head>

<body class="min-h-screen py-10 px-4 md:px-10 flex flex-col items-center">

<div class="max-w-6xl w-full cream-card overflow-hidden border border-[#F3E5AB] flex flex-col md:flex-row">

    <div class="md:w-1/2 p-8 md:p-10 border-b md:border-b-0 md:border-r border-[#F3E5AB] space-y-6">

        <header>
            <h1 class="text-3xl font-black mb-1 text-[#5F4B32]">
                Bear.saving <span class="text-[#F4B400]">v3.0</span>
            </h1>
            <p class="text-[#A67C52] text-xs font-bold tracking-widest uppercase">
                Emergency Buffer System
            </p>
        </header>

        <!-- 收入模式 -->
        <section class="space-y-3">
            <h3 class="font-bold text-[#8B5E3C] text-sm">
                收入模式選擇
            </h3>

            <div class="grid grid-cols-2 gap-3">
                <button id="fixedBtn" class="mode-btn mode-active rounded-2xl p-3 font-bold border border-[#F3E5AB] bg-[#FFF8DC]">
                    固定收入
                    <div class="text-[10px] opacity-70 mt-1">上班族 / 穩定薪資</div>
                </button>

                <button id="variableBtn" class="mode-btn rounded-2xl p-3 font-bold border border-[#F3E5AB] bg-[#FDFBF0]">
                    不固定收入
                    <div class="text-[10px] opacity-70 mt-1">接案 / 自由工作</div>
                </button>
            </div>
        </section>

        <!-- 收入 -->
        <script>
            function toggleIncomeFields() {
                const isFixed = incomeMode === 'fixed';
                document.getElementById('costTaxSection').style.display = isFixed ? 'none' : 'grid';
            }
        </script>
        <section class="space-y-3">
            <h3 class="font-bold text-[#8B5E3C] flex items-center text-sm">
                <span class="w-5 h-5 bg-[#F4B400] text-white rounded-full flex items-center justify-center mr-2 text-[10px]">1</span>
                本月收入淨化
            </h3>

            <div class="grid grid-cols-1 gap-3">

                <div>
                    <label class="input-label ml-1">本月進帳金額</label>
                    <input type="number" id="grossIncome" placeholder="NT$ 0"
                           class="w-full bg-[#FDFBF0] rounded-xl p-3 border-2 border-transparent shadow-sm">
                </div>

                <div id="costTaxSection" class="grid grid-cols-2 gap-3" style="display:none;">
                    <div>
                        <label class="input-label ml-1">經營成本</label>
                        <input type="number" id="businessCost" placeholder="NT$ 0"
                               class="w-full bg-[#FDFBF0] rounded-xl p-3 border-2 border-transparent shadow-sm">
                    </div>

                    <div>
                        <label class="input-label ml-1">預留稅率 (%)</label>
                        <input type="number" id="taxRate" value="15"
                               class="w-full bg-[#FDFBF0] rounded-xl p-3 border-2 border-transparent shadow-sm text-center font-bold">
                    </div>
                </div>

                <div class="result-highlight flex justify-between items-center">
                    <span class="text-xs font-bold text-[#A67C52]">本月淨收入</span>
                    <span id="netResult" class="text-lg font-black text-[#F4B400]">NT$ 0</span>
                </div>
            </div>
        </section>

        <!-- 蓄水池 -->
        <section class="space-y-3">
            <h3 class="font-bold text-[#8B5E3C] flex items-center text-sm">
                <span class="w-5 h-5 bg-[#F4B400] text-white rounded-full flex items-center justify-center mr-2 text-[10px]">2</span>
                緊急備用金計算
            </h3>

            <div>
                <label class="input-label ml-1">
                    每月必要生活費
                </label>
                <input type="number" id="monthlyExpense" value="45000"
                       class="w-full bg-[#FDFBF0] rounded-xl p-3 border-2 border-transparent shadow-sm text-lg font-bold">
            </div>

            <div class="result-highlight flex justify-between items-center bg-[#F0F9FF] border-[#3B82F6]/30">
                <span class="text-xs font-bold text-[#3B82F6]">本月可存入蓄水池</span>
                <span id="toPoolAmount" class="text-lg font-black text-[#3B82F6]">NT$ 0</span>
            </div>

            <div id="targetDescription" class="protocol-box text-[11px] leading-relaxed">
            </div>
        </section>
    </div>

    <!-- 右側 -->
    <div class="md:w-1/2 p-8 md:p-12 bg-[#FFFEFA] flex flex-col justify-center">

        <div class="max-w-sm mx-auto w-full space-y-8">

            <div class="flex items-center space-x-8">
                <div class="w-20 h-40 bg-[#FDFBF0] rounded-full border-4 border-[#F3E5AB] overflow-hidden relative shadow-inner">
                    <div id="waterLevel" class="water-wave absolute bottom-0 w-full" style="height: 0%;"></div>
                </div>

                <div>
                    <p id="monthsText" class="text-6xl font-black text-[#5F4B32]">0.0</p>
                    <p class="text-[#A67C52] text-[10px] font-bold tracking-widest uppercase">
                        Months Capacity
                    </p>

                    <div id="statusBadge"
                         class="mt-2 inline-block px-3 py-0.5 rounded-full text-[10px] font-black bg-[#F3E5AB] text-[#8B5E3C]">
                        Status Check
                    </div>
                </div>
            </div>

            <div class="space-y-4">
                <div>
                    <label class="input-label ml-1">目前蓄水池總額</label>
                    <input type="number" id="currentPool" value="150000"
                           class="w-full bg-[#FDFBF0] rounded-2xl p-4 text-xl font-bold border-2 border-transparent shadow-sm">
                </div>

                <div class="bg-[#FFF9E3] p-5 rounded-2xl border border-[#F3E5AB] min-h-[90px] flex items-center">
                    <p id="actionGuide" class="text-sm leading-relaxed font-medium">
                        請輸入數據...
                    </p>
                </div>
            </div>

            <div class="protocol-box border-dashed text-[10px] space-y-1 opacity-80">
                <p class="font-bold text-[#8B5E3C]">Bear.saving 提醒</p>
                <p>
                    錢有時候不是拿來炫耀，也不是拿來證明自己。
                    而是拿來換生活的鬆弛感。
                </p>
            </div>
        </div>
    </div>
</div>

<script>

    let incomeMode = 'fixed';

    const ids = [
        'grossIncome',
        'businessCost',
        'taxRate',
        'monthlyExpense',
        'currentPool'
    ];

    ids.forEach(id => {
        document.getElementById(id).addEventListener('input', calculate);
    });

    const fixedBtn = document.getElementById('fixedBtn');
    const variableBtn = document.getElementById('variableBtn');

    fixedBtn.addEventListener('click', () => {
        incomeMode = 'fixed';
        fixedBtn.classList.add('mode-active');
        variableBtn.classList.remove('mode-active');
        toggleIncomeFields();
        calculate();
    });

    variableBtn.addEventListener('click', () => {
        incomeMode = 'variable';
        variableBtn.classList.add('mode-active');
        fixedBtn.classList.remove('mode-active');
        toggleIncomeFields();
        calculate();
    });

    function calculate() {

        const gross = parseFloat(document.getElementById('grossIncome').value) || 0;
        const cost = parseFloat(document.getElementById('businessCost').value) || 0;
        const taxRate = (parseFloat(document.getElementById('taxRate').value) || 0) / 100;
        const expense = parseFloat(document.getElementById('monthlyExpense').value) || 0;
        const pool = parseFloat(document.getElementById('currentPool').value) || 0;

        // 淨收入
        // 固定收入：不套用經營成本與預留稅率，直接以本月進帳金額計算。
        // 不固定收入：才扣除經營成本與預留稅率。
        const tax = incomeMode === 'variable' ? Math.round(Math.max(0, gross - cost) * taxRate) : 0;
        const net = incomeMode === 'fixed'
            ? Math.max(0, gross)
            : Math.max(0, gross - cost - tax);

        document.getElementById('netResult').innerText = `NT$ ${net.toLocaleString()}`;

        // 可存入蓄水池
        const toPool = net - expense;
        const toPoolEl = document.getElementById('toPoolAmount');

        toPoolEl.innerText = `NT$ ${toPool.toLocaleString()}`;
        toPoolEl.style.color = toPool >= 0 ? '#3B82F6' : '#EF4444';

        // 水位
        const months = expense > 0 ? (pool / expense).toFixed(1) : 0;

        document.getElementById('monthsText').innerText = months;

        const percent = Math.min((months / 12) * 100, 100);
        document.getElementById('waterLevel').style.height = `${percent}%`;

        const badge = document.getElementById('statusBadge');
        const guide = document.getElementById('actionGuide');
        const targetDescription = document.getElementById('targetDescription');

        // 固定收入
        if (incomeMode === 'fixed') {

            document.getElementById('costTaxSection').style.display = 'none';

            const lv1 = expense * 3;
            const lv2 = expense * 6;
            const lv3 = expense * 12;

            targetDescription.innerHTML = `
                <p class="mb-1">
                    <span class="text-red-500 font-bold">基礎版（3M） - NT$ ${lv1.toLocaleString()}：</span>
                    工作轉換 / 突發狀況蓄水。
                </p>

                <p class="mb-1">
                    <span class="text-emerald-600 font-bold">安全版（6M） - NT$ ${lv2.toLocaleString()}：</span>
                    較穩定，可降低突然失業焦慮。
                </p>

                <p>
                    <span class="text-blue-500 font-bold">鬆弛版（12M） - NT$ ${lv3.toLocaleString()}：</span>
                    擁有休息權與離職權。
                </p>
            `;

            if (months < 3) {
                badge.innerText = 'LOW BUFFER';
                badge.className = 'mt-2 inline-block px-3 py-0.5 rounded-full text-[10px] font-black bg-red-100 text-red-600';
                guide.innerHTML = '🚨 建議優先建立 3 個月緊急備用金，避免突發狀況直接影響生活。';

            } else if (months < 6) {
                badge.innerText = 'STABLE';
                badge.className = 'mt-2 inline-block px-3 py-0.5 rounded-full text-[10px] font-black bg-emerald-100 text-emerald-600';
                guide.innerHTML = '✅ 已具備基本安全感，可以開始降低對工作的恐慌。';

            } else {
                badge.innerText = 'RELAX';
                badge.className = 'mt-2 inline-block px-3 py-0.5 rounded-full text-[10px] font-black bg-blue-100 text-blue-600';
                guide.innerHTML = '☁️ 蓄水池健康。錢開始幫你換生活的鬆弛感。';
            }

        }

        // 不固定收入
        else {

            document.getElementById('costTaxSection').style.display = 'grid';

            const lv1 = expense * 3;
            const lv2 = expense * 6;
            const lv3 = expense * 12;

            targetDescription.innerHTML = `
                <p class="mb-1">
                    <span class="text-red-500 font-bold">LV1（3M）- NT$ ${lv1.toLocaleString()}：</span>
                    生存警戒。僅撥發最低生活支出。
                </p>

                <p class="mb-1">
                    <span class="text-emerald-600 font-bold">LV2（6M）- NT$ ${lv2.toLocaleString()}：</span>
                    安全平衡。收入波動時仍可正常生活。
                </p>

                <p>
                    <span class="text-blue-500 font-bold">LV3（12M）- NT$ ${lv3.toLocaleString()}：</span>
                    自由溢流。獲得拒絕不適合工作的權利。
                </p>
            `;

            if (months < 3) {
                badge.innerText = 'WARNING';
                badge.className = 'mt-2 inline-block px-3 py-0.5 rounded-full text-[10px] font-black bg-red-100 text-red-600';
                guide.innerHTML = '🚨 水位不足，自由工作者建議優先建立蓄水池。';

            } else if (months < 12) {
                badge.innerText = 'STABLE';
                badge.className = 'mt-2 inline-block px-3 py-0.5 rounded-full text-[10px] font-black bg-emerald-100 text-emerald-600';
                guide.innerHTML = '✅ 水位健康。請維持固定撥薪，讓大腦回歸創作。';

            } else {
                badge.innerText = 'FREEDOM';
                badge.className = 'mt-2 inline-block px-3 py-0.5 rounded-full text-[10px] font-black bg-blue-100 text-blue-600';
                guide.innerHTML = '🚀 已獲得自由接案與拒絕權。';
            }
        }
    }

    calculate();

</script>

</body>
</html>
